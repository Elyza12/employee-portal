<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Samgyupsal Employee Portal</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1b1b1b,#2a2a2a);
margin:0;
color:white;
}

header{
background:#8b0000;
padding:20px;
text-align:center;
font-size:26px;
}

section{
display:none;
padding:20px;
max-width:900px;
margin:auto;
background:white;
color:black;
border-radius:10px;
margin-top:30px;
}

#login{
display:block;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#b22222;
color:white;
border:none;
padding:12px;
cursor:pointer;
border-radius:6px;
width:100%;
margin-top:10px;
}

button:hover{
background:#8b0000;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#8b0000;
color:white;
}

img.sched{
width:100%;
max-width:900px;
cursor:pointer;
border-radius:8px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:25px;
border-radius:10px;
width:300px;
}

</style>
</head>

<body>

<header>
🍖 Samgyupsal Employee Portal
</header>

<!-- LOGIN -->

<section id="login">

<h2>Employee Login</h2>

<form id="loginForm">

<input type="text" id="username" placeholder="First Name" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p id="loginMessage" style="color:red;"></p>

</section>

<!-- EMPLOYEE PORTAL -->

<section id="portal">

<h2>Welcome, <span id="employeeName"></span></h2>

<h3>📅 Work Schedule</h3>

<img src="sched.png" class="sched" onclick="openSchedule()">

<h3>Request Day Off</h3>

<button onclick="openRequestForm()">Request Day Off</button>

<button onclick="logout()">Logout</button>

</section>

<!-- ADMIN PANEL -->

<section id="adminPanel">

<h2>Admin Panel</h2>

<table id="requestTable">

<tr>
<th>Employee</th>
<th>Date</th>
<th>Reason</th>
<th>Time</th>
<th>Status</th>
</tr>

</table>

<button onclick="loadRequests()">Refresh</button>
<button onclick="logout()">Logout</button>

</section>

<!-- REQUEST FORM -->

<div id="requestModal" class="modal">

<div class="modal-content">

<h3>Request Day Off</h3>

<input type="date" id="offDate">

<textarea id="offReason" placeholder="Reason"></textarea>

<button onclick="submitRequest()">Submit</button>

<button onclick="closeRequestForm()">Cancel</button>

</div>

</div>

<!-- SCHEDULE VIEWER -->

<div id="scheduleViewer" class="modal">

<img src="sched.png" style="max-width:90%;max-height:90%;">

<div style="position:absolute;top:20px;right:30px;color:white;font-size:30px;cursor:pointer;"
onclick="closeSchedule()">✖</div>

</div>

<script>

const WEBAPP="https://script.google.com/macros/s/AKfycbxf8gmHrLkVvBLAAfA_ooGiK2HYEooRkKK0f8Kh0t3T2SlhI0R1kjGqZk5a2Qn1G02A/exec";

const employees={

admin:{password:"admin1234",role:"admin"},

elyza:{password:"1234"},
eliza:{password:"1234"},
ramy:{password:"1234"},
joshua:{password:"1234"},
jules:{password:"1234"}

};

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const user=document.getElementById("username").value.toLowerCase();
const pass=document.getElementById("password").value;

if(employees[user] && employees[user].password===pass){

if(employees[user].role==="admin"){

document.getElementById("login").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadRequests();
return;

}

document.getElementById("login").style.display="none";
document.getElementById("portal").style.display="block";

document.getElementById("employeeName").innerText=user;

}else{

document.getElementById("loginMessage").innerText="Invalid login";

}

});

function logout(){

document.getElementById("portal").style.display="none";
document.getElementById("adminPanel").style.display="none";
document.getElementById("login").style.display="block";

}

function openSchedule(){

document.getElementById("scheduleViewer").style.display="flex";

}

function closeSchedule(){

document.getElementById("scheduleViewer").style.display="none";

}

function openRequestForm(){

document.getElementById("requestModal").style.display="flex";

}

function closeRequestForm(){

document.getElementById("requestModal").style.display="none";

}

async function submitRequest(){

const date=document.getElementById("offDate").value;
const reason=document.getElementById("offReason").value;
const user=document.getElementById("employeeName").innerText;

if(!date || !reason){

alert("Complete form");
return;

}

const formData=new FormData();

formData.append("name",user);
formData.append("date",date);
formData.append("reason",reason);

await fetch(WEBAPP,{
method:"POST",
body:formData
});

alert("Request sent!");

closeRequestForm();

}

async function loadRequests(){

const table=document.getElementById("requestTable");

table.innerHTML=`<tr>
<th>Employee</th>
<th>Date</th>
<th>Reason</th>
<th>Time</th>
<th>Status</th>
</tr>`;

const res=await fetch(WEBAPP);

const data=await res.json();

data.forEach(r=>{

let row=table.insertRow();

row.insertCell(0).innerText=r.name;
row.insertCell(1).innerText=r.date;
row.insertCell(2).innerText=r.reason;
row.insertCell(3).innerText=new Date(r.time).toLocaleString();
row.insertCell(4).innerText=r.status;

});

}

</script>

</body>
</html>
