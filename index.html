<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Awi Employee Portal</title>
<style>
body{ font-family: Arial, sans-serif; background: #1b1b1b; margin: 0;}
header{ background: #8b0000; color:white; padding:20px; text-align:center; font-size:28px; font-weight:bold;}
section{ display:none; background:white; margin:30px auto; padding:25px; max-width:900px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.3);}
#login{ display:block; max-width:400px;}
input,textarea{ width:100%; padding:10px; margin:8px 0; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;}
button{ background:#b22222; color:white; border:none; padding:10px 15px; cursor:pointer; font-weight:bold; border-radius:6px; margin-top:5px;}
button:hover{ background:#8b0000;}
table{ width:100%; border-collapse:collapse; margin-top:15px;}
th{ background:#8b0000; color:white; padding:10px;}
td{ padding:10px; border-bottom:1px solid #ddd;}
.status-pending{ color:orange; font-weight:bold; }
.status-approved{ color:green; font-weight:bold; }
.status-rejected{ color:red; font-weight:bold; }
.action-btn{ margin-right:5px; padding:5px 10px; font-size:14px; border-radius:5px; cursor:pointer; }
.action-btn:hover{ opacity:0.8; }
.approve-btn{ background:green; color:white; }
.reject-btn{ background:red; color:white; }
#offNote{ color:black; font-style:normal; margin-bottom:5px;}
</style>
</head>
<body>

<header>Awi Employee Portal</header>

<!-- LOGIN -->
<section id="login">
<h2>Login</h2>
<form id="loginForm">
<input id="username" placeholder="First Name" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p id="loginMessage" style="color:red;"></p>
</section>

<!-- EMPLOYEE PORTAL -->
<section id="portal">
<h2>Welcome <span id="employeeName"></span></h2>

<h3>Work Schedule</h3>
<img src="schedule.png" style="width:100%;border-radius:10px;margin-bottom:20px;">

<h3>Incident Reports</h3>
<table id="irTable">
<tr>
<th>Date</th><th>Incident</th><th>Status</th><th>Note</th>
</tr>
</table>

<h3>Change Password</h3>
<input type="password" id="newPassword" placeholder="New Password">
<button type="button" onclick="changePassword()">Update Password</button>

<br><br>
<button type="button" onclick="openRequestForm()">Request Day Off</button>
<button type="button" onclick="openPayslip()">View Payslip</button>
<button type="button" onclick="logout()">Logout</button>
</section>

<!-- REQUEST FORM -->
<section id="requestFormSection">
<h2>Request Day Off</h2>
<p id="offNote">Select only Monday–Thursday.</p>
<input type="date" id="offDate">
<textarea id="offReason" placeholder="Reason"></textarea>
<button type="button" onclick="submitRequest()">Submit</button>
<button type="button" onclick="closeRequestForm()">Cancel</button>
</section>

<!-- PAYSLIP SECTION -->
<section id="payslipSection">
<h2>View Payslip</h2>
<select id="monthSelect">
<option>January</option><option>February</option><option>March</option><option>April</option>
<option>May</option><option>June</option><option>July</option><option>August</option>
<option>September</option><option>October</option><option>November</option><option>December</option>
</select>
<select id="cutoffSelect">
<option value="1-15">1-15</option>
<option value="16-31">16-End</option>
</select>
<button type="button" onclick="loadPayslip()">View Payslip</button>
<div id="payslipViewer"></div>
<br>
<button type="button" onclick="closePayslip()">Back</button>
</section>

<!-- ADMIN PANEL -->
<section id="adminPanel">
<h2>Admin Request Panel</h2>
<table id="requestTable">
<tr>
<th>Employee</th><th>Date</th><th>Reason</th><th>Time Requested</th><th>Status</th><th>Action</th>
