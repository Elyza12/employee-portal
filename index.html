<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Samgyupsal Employee Portal</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1b1b1b,#2a2a2a);
color:white;
}

header{
background:#111;
padding:20px;
text-align:center;
font-size:28px;
color:#d4a373;
letter-spacing:2px;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:40px;
}

.card{
background:rgba(0,0,0,0.7);
padding:30px;
margin:20px;
border-radius:12px;
width:250px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #d4a373;
}

button{
background:#b22222;
border:none;
padding:12px 20px;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#8b0000;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:30px;
border-radius:10px;
width:300px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
color:black;
margin-top:40px;
}

th{
background:#b22222;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

@media(max-width:768px){
.container{
flex-direction:column;
align-items:center;
}
}

</style>
</head>

<body>

<header>
🍖 Samgyupsal Employee Portal
</header>

<div class="container">

<div class="card">
<h2>🔥 Request Day Off</h2>
<p>Submit leave request</p>
<button onclick="openRequestForm()">Request</button>
</div>

<div class="card">
<h2>📋 Admin Panel</h2>
<p>View employee requests</p>
<button onclick="loadRequests()">Load Requests</button>
</div>

</div>

<div id="requestModal" class="modal">

<div class="modal-content">

<h3>Request Day Off</h3>

<input type="date" id="offDate">

<textarea id="offReason" placeholder="Reason"></textarea>

<button onclick="submitRequest()">Submit</button>

<button onclick="closeRequestForm()">Close</button>

</div>

</div>

<table id="requestTable">

<tr>
<th>Employee</th>
<th>Date</th>
<th>Reason</th>
<th>Time Requested</th>
<th>Status</th>
</tr>

</table>

<script>

const WEBAPP="https://script.google.com/macros/s/AKfycbxf8gmHrLkVvBLAAfA_ooGiK2HYEooRkKK0f8Kh0t3T2SlhI0R1kjGqZk5a2Qn1G02A/exec";

function openRequestForm(){
document.getElementById("requestModal").style.display="flex";
}

function closeRequestForm(){
document.getElementById("requestModal").style.display="none";
}

async function submitRequest(){

const date=document.getElementById("offDate").value;
const reason=document.getElementById("offReason").value;

if(!date||!reason){
alert("Please complete the form");
return;
}

try{

const formData=new FormData();
formData.append("name","Employee");
formData.append("date",date);
formData.append("reason",reason);

await fetch(WEBAPP,{
method:"POST",
body:formData
});

alert("Request submitted!");
closeRequestForm();

}catch(err){
console.log(err);
alert("Error sending request");
}

}

async function loadRequests(){

const table=document.getElementById("requestTable");

table.innerHTML=
`<tr>
<th>Employee</th>
<th>Date</th>
<th>Reason</th>
<th>Time Requested</th>
<th>Status</th>
</tr>`;

try{

const res=await fetch(WEBAPP);
const data=await res.json();

data.forEach(r=>{

let row=table.insertRow();

row.insertCell(0).innerText=r.name;
row.insertCell(1).innerText=r.date;
row.insertCell(2).innerText=r.reason;
row.insertCell(3).innerText=new Date(r.time).toLocaleString();
row.insertCell(4).innerText=r.status;

});

}catch(err){
console.log(err);
}

}

</script>

</body>
</html>
