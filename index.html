<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awi Employee Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial;
background:linear-gradient(135deg,#1b1b1b,#2b2b2b);
}

header{
background:#8b0000;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

section{
display:none;
padding:25px;
max-width:900px;
margin:40px auto;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

#login{display:block;max-width:400px;}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#b22222;
color:white;
border:none;
padding:10px;
cursor:pointer;
width:100%;
border-radius:6px;
font-weight:bold;
}

button:hover{background:#8b0000;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#8b0000;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.status-pending{color:orange;font-weight:bold;}
.status-approved{color:green;font-weight:bold;}
.status-rejected{color:red;font-weight:bold;}

img.sched{
width:100%;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<header>Awi Employee Portal</header>

<!-- LOGIN -->
<section id="login">
<h2>Login</h2>
<form id="loginForm">

<input type="text" id="username" placeholder="First Name" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>
<p id="loginMessage" style="color:red;"></p>
</section>


<!-- EMPLOYEE PORTAL -->
<section id="portal">

<h2>Welcome, <span id="employeeName"></span></h2>

<h3>Work Schedule</h3>
<img src="sched.png" class="sched">

<h3>Incident Reports</h3>

<table id="irTable">
<tr>
<th>Date</th>
<th>Incident</th>
<th>Status</th>
<th>Note</th>
</tr>
</table>

<input type="password" id="newPassword" placeholder="New Password">
<button onclick="changePassword()">Update Password</button>

<button onclick="openRequestForm()">Request Off</button>
<button onclick="logout()">Logout</button>

</section>


<!-- REQUEST FORM -->
<section id="requestFormSection">

<h2>Request Day Off</h2>

<label>Select Date (Mon–Thu)</label>
<input type="date" id="offDate">

<label>Reason</label>
<textarea id="offReason"></textarea>

<button onclick="submitRequest()">Submit Request</button>
<button onclick="closeRequestForm()">Cancel</button>

</section>


<!-- ADMIN PANEL -->
<section id="adminPanel">

<h2>Admin — Request List</h2>

<table id="requestTable">
<tr>
<th>Employee</th>
<th>Date</th>
<th>Reason</th>
<th>Time Requested</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

<button onclick="logout()">Logout</button>

</section>


<script>

const WEBAPP="https://script.google.com/macros/s/AKfycbxf8gmHrLkVvBLAAfA_ooGiK2HYEooRkKK0f8Kh0t3T2SlhI0R1kjGqZk5a2Qn1G02A/exec";

/* EMPLOYEES */

const employees={
admin:{password:'admin1234',role:'admin',irs:[]},
elyza:{password:'1234',irs:[]},
eliza:{password:'1234',irs:[{date:'January 23, 2026',incident:'Food Violation Policy',status:'IR SERVED',note:'Warning'}]},
rachelle:{password:'1234',irs:[]},
ramy:{password:'1234',irs:[{date:'November 16, 2025',incident:'AWOL',status:'IR SERVED',note:'Warning'}]}
};


/* LOGIN */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const user=document.getElementById("username").value.trim().toLowerCase();
const pass=document.getElementById("password").value;

if(employees[user] && employees[user].password===pass){

if(employees[user].role==="admin"){

document.getElementById("login").style.display="none";
document.getElementById("adminPanel").style.display="block";

loadRequests();
setInterval(loadRequests,2000);

return;

}

document.getElementById("login").style.display="none";
document.getElementById("portal").style.display="block";

document.getElementById("employeeName").innerText=user;

loadIR(user);

}else{

document.getElementById("loginMessage").innerText="Invalid username or password";

}

});


/* LOGOUT */

function logout(){

document.getElementById("portal").style.display="none";
document.getElementById("adminPanel").style.display="none";
document.getElementById("requestFormSection").style.display="none";
document.getElementById("login").style.display="block";

}


/* LOAD IR */

function loadIR(user){

const table=document.getElementById("irTable");

table.innerHTML="<tr><th>Date</th><th>Incident</th><th>Status</th><th>Note</th></tr>";

employees[user].irs.forEach(ir=>{

let row=table.insertRow();

row.insertCell(0).innerText=ir.date;
row.insertCell(1).innerText=ir.incident;
row.insertCell(2).innerText=ir.status;
row.insertCell(3).innerText=ir.note;

});

}


/* REQUEST FORM */

function openRequestForm(){

document.getElementById("portal").style.display="none";
document.getElementById("requestFormSection").style.display="block";

}

function closeRequestForm(){

document.getElementById("requestFormSection").style.display="none";
document.getElementById("portal").style.display="block";

}


/* SUBMIT REQUEST */

async function submitRequest(){

const date=document.getElementById("offDate").value;
const reason=document.getElementById("offReason").value;
const name=document.getElementById("employeeName").innerText;

if(!date||!reason){

alert("Complete the form");
return;

}

const formData=new FormData();

formData.append("name",name);
formData.append("date",date);
formData.append("reason",reason);

await fetch(WEBAPP,{method:"POST",body:formData});

alert("Request sent");

document.getElementById("offDate").value="";
document.getElementById("offReason").value="";

closeRequestForm();

}


/* LOAD REQUESTS */

function loadRequests(){

fetch(WEBAPP)

.then(res=>res.json())

.then(data=>{

const table=document.getElementById("requestTable");

table.innerHTML=`<tr>
<th>Employee</th>
<th>Date</th>
<th>Reason</th>
<th>Time Requested</th>
<th>Status</th>
<th>Action</th>
</tr>`;

data.forEach(req=>{

const row=document.createElement("tr");

row.innerHTML=`

<td>${req.name}</td>

<td>${new Date(req.date).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</td>

<td>${req.reason}</td>

<td>${new Date(req.time).toLocaleString('en-US',{year:'numeric',month:'long',day:'numeric',hour:'numeric',minute:'2-digit'})}</td>

<td class="status-${req.status.toLowerCase()}">${req.status}</td>

<td>

${req.status==="Pending"?`
<button onclick="approve(${req.row})">Approve</button>
<button onclick="reject(${req.row})">Reject</button>
`:""}

</td>

`;

table.appendChild(row);

});

});

}


/* APPROVE */

function approve(row){

fetch(WEBAPP,{
method:"POST",
body:JSON.stringify({action:"approve",row:row})
})

.then(()=>loadRequests());

}


/* REJECT */

function reject(row){

fetch(WEBAPP,{
method:"POST",
body:JSON.stringify({action:"reject",row:row})
})

.then(()=>loadRequests());

}

</script>

</body>
</html>
